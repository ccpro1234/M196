<script>

/* --------------------
LOGIN SYSTEM
-------------------- */

const LICENSE = {
user:"1234",
pass:"1234",
expire:"2026-04-29T23:59:59"
};

function login(){

const u=document.getElementById("user").value.trim();
const p=document.getElementById("pass").value.trim();
const err=document.getElementById("login-error");

if(u===LICENSE.user && p===LICENSE.pass){

localStorage.setItem("baccarat_login","ok");

document.getElementById("login-screen").style.display="none";

checkExpiry();

}else{

err.textContent="user หรือ password ไม่ถูกต้อง";

}

}

function checkExpiry(){

const now = new Date();
const exp = new Date(LICENSE.expire);

document.getElementById("expiry-date").textContent =
exp.toLocaleDateString("th-TH");

if(now > exp){

document.body.innerHTML =
"<h1 style='color:red;text-align:center;margin-top:40px'>โปรแกรมหมดอายุ</h1>";

throw new Error("EXPIRED");

}

}

/* auto login check */

window.addEventListener("load",()=>{

document.getElementById("login-screen").style.display="flex";

});



const ROWS=6,DNA_ROWS=4,DEFAULT_COLS=12;
const state={
history:[],
predictions:[],
dna:[],
predictDNA:[],
patternStats:{},
patternMemory:{},
currentStep:1,
maxSteps:3
};

function addResult(r){

if(r === 'T'){
state.history.push('T');

if(state.history.length > 120){
state.history.shift();
}

updateUI();
return;
}

if(state.predictions.length && r!=='T'){

const last = state.predictions.at(-1);

if(last.result !== 'WAIT'){

const win = last.result === r;

const pattern = state.history.length >= 4
? state.history.slice(-4).join('')
: '';

state.predictDNA.push({
pattern,
pred:last.result,
real:r,
win
});

if(state.predictDNA.length > 200){
state.predictDNA.shift();
}

/* --------------------
LEVEL 6 MEMORY LEARN
-------------------- */

if(pattern){

if(!state.patternMemory[pattern]){
state.patternMemory[pattern] = {P:0,B:0};
}

if(win){

if(last.result === 'P'){
state.patternMemory[pattern].P++;
}

if(last.result === 'B'){
state.patternMemory[pattern].B++;
}

}

}

/* -------------------- */

state.dna.push(win);

if(state.dna.length > 200){
state.dna.shift();
}

state.currentStep =
win ? 1 :
state.currentStep >= state.maxSteps ? 1 :
state.currentStep + 1;

}

}

state.history.push(r);

if(state.history.length > 120){
state.history.shift();
}

generatePrediction();
updateUI();

}

function resetGame(){

if(!confirm("ล้างข้อมูลทั้งหมด?"))return;

state.history=[];
state.predictions=[];
state.dna=[];
state.predictDNA=[];
state.patternStats={};   // เพิ่มตรงนี้
state.currentStep=1;

updateUI();

}

function undo(){

if(state.history.length === 0) return;

state.history.pop();

if(state.predictions.length){
state.predictions.pop();
}

if(state.dna.length){
state.dna.pop();
}

/* 👇 ต้องเพิ่มตัวนี้ */
if(state.predictDNA.length){
state.predictDNA.pop();
}

generatePrediction();
updateUI();

}




function trackPattern(name, win){

if(!state.patternStats[name]){
state.patternStats[name]={win:0,loss:0};
}

if(win){
state.patternStats[name].win++;
}else{
state.patternStats[name].loss++;
}

}





function generatePrediction(){

const history = state.history.filter(x=>x!=='T');

if(history.length < 3){

state.predictions.push({
result:'WAIT',
reason:'Need 3 rounds',
confidence:0
});

/* safeguard prediction memory */
if(state.predictions.length > 200){
state.predictions.splice(0, state.predictions.length - 200);
}

return;

}

/* เริ่ม AI logic ตรงนี้ */

let scoreP = 0;
let scoreB = 0;

/* --------------------
MARKET PHASE DETECTOR
-------------------- */

let market = "neutral";

if(history.length >= 12){

const last12 = history.slice(-12);

let run = 1;
let maxRun = 1;
let change = 0;

for(let i=1;i<last12.length;i++){

if(last12[i] === last12[i-1]){
run++;
maxRun = Math.max(maxRun, run);
}else{
run = 1;
change++;
}

}

/* Dragon */

if(maxRun >= 5){
market = "dragon";
}

/* Chop */

else if(change >= 9){
market = "chop";
}

/* Mixed */

else{
market = "mixed";
}

}

/* --------------------
MARKET STRATEGY
-------------------- */

if(market === "dragon"){

scoreP *= 1.25;
scoreB *= 1.25;

}

else if(market === "chop"){

scoreP *= 1.15;
scoreB *= 1.15;

}

else if(market === "mixed"){

scoreP *= 0.92;
scoreB *= 0.92;

}

/* --------------------
PATTERN WEIGHT SYSTEM
-------------------- */

const TIER1 = 1.4
const TIER2 = 1.0
const TIER3 = 0.7

const baseWeightPattern = 1.0
const baseWeightTrend = 1.1
const baseWeightRun = 1.2
const baseWeightChaos = 0.8
const baseWeightLate = 1.1


/* --------------------
ADAPTIVE PATTERN WEIGHT
-------------------- */

let weightPattern = baseWeightPattern;
let weightTrend = baseWeightTrend;
let weightRun = baseWeightRun;
let weightChaos = baseWeightChaos;


/* AI ปรับ weight จากฟอร์ม */

if(state.dna.length >= 20){

const win = state.dna.filter(v=>v).length;
const rate = win / state.dna.length;

/* ฟอร์มดี */

if(rate >= 0.6){
weightPattern *= 1.3;
weightTrend *= 1.2;
weightRun *= 1.15;   // 👈 เพิ่มตรงนี้
}

/* ฟอร์มตก */

if(rate <= 0.45){
weightPattern *= 0.8;
weightTrend *= 0.9;
weightRun *= 0.9;    // 👈 เพิ่มตรงนี้
}

}

/* --------------------
PATTERN MEMORY
-------------------- */

/* PingPong 2 Detector */

if(history.length >= 4){
const last4 = history.slice(-4).join('');

if(last4 === 'PPBB'){
scoreP += 2;
}

if(last4 === 'BBPP'){
scoreB += 2;
}
}
/* --------------------
TRIPLE CHOP DETECTOR
-------------------- */

if(history.length >= 6){
const last6 = history.slice(-6).join('');

if(last6 === 'PPPBBB'){
scoreP += 3;
}

if(last6 === 'BBBPPP'){
scoreB += 3;
}
}


/* Triple Chop Continuation */

if(history.length >= 9){
const last9 = history.slice(-9).join('');

if(last9 === 'PPPBBBPPP'){
scoreP += 4;
}

if(last9 === 'BBBPPPBBB'){
scoreB += 4;
}
}


/* --------------------
PATTERN 3
-------------------- */

if(history.length >= 3){
const last3 = history.slice(-3).join('');

if(last3 === 'PPP') scoreP += 2;
if(last3 === 'BBB') scoreB += 2;

if(last3 === 'PBP') scoreB += 1.5;
if(last3 === 'BPB') scoreP += 1.5 * weightTrend;

if(last3 === 'PPB') scoreP += 1;
if(last3 === 'BBP') scoreB += 1;
}


/* --------------------
DRAGON BREAK DETECTOR
-------------------- */

if(history.length >= 5){

const last5 = history.slice(-5).join('');

if(last5 === 'PPPPB') scoreB += 2.5;
if(last5 === 'BBBBP') scoreP += 2.5;

}


/* --------------------
ZIGZAG DETECTOR
-------------------- */

if(history.length >= 6){

const last6 = history.slice(-6).join('');

if(last6 === 'PBPBPB') scoreB += 2.5;
if(last6 === 'BPBPBP') scoreP += 2.5;

}
/* --------------------
FAKE CHOP → DRAGON
-------------------- */

if(history.length >= 7){

const last7 = history.slice(-7).join('');

if(last7 === 'PBPBPBB') scoreB += 4;
if(last7 === 'BPBPBPP') scoreP += 4;

}

/* --------------------
CHOP BREAK MOMENTUM
-------------------- */

if(history.length >= 6){

const last6 = history.slice(-6);

let change = 0;

for(let i=1;i<last6.length;i++){
if(last6[i] !== last6[i-1]) change++;
}

if(change >= 4){

const last = history.at(-1);
const prev = history.at(-2);

if(last === prev){

if(last === 'P') scoreP += 3;
if(last === 'B') scoreB += 3;

}

}

}



/* --------------------
RUN LENGTH MODEL
-------------------- */

let run = 1;

for(let i = history.length-1; i > 0; i--){
    if(history[i] === history[i-1]) run++;
    else break;
}

const last = history.at(-1);
/* --------------------
DRAGON KILLER
-------------------- */

if(run >= 6){

// dragon ยาวเกิน มีโอกาสแตก
if(last === 'P') scoreB += 3.5;
if(last === 'B') scoreP += 3.5;

}


/* --------------------
DRAGON BREAK (เพิ่มตรงนี้)
-------------------- */

if(run >= 4){

if(last === 'P') scoreB += 4;
if(last === 'B') scoreP += 4;

}

/* --------------------
PINGPONG ENGINE
-------------------- */

if(history.length >= 4){

const last4 = history.slice(-4).join('');

if(last4 === 'BPBP' || last4 === 'PBPB'){

if(last === 'P') scoreB += 3;
if(last === 'B') scoreP += 3;

}

}

/* --------------------
RUN 4 BREAK DETECTOR
-------------------- */

if(run === 4){

if(last === 'P') scoreB += 3;
if(last === 'B') scoreP += 3;

}


/* run = 2 → มักจะไปต่อ */
if(run === 2){
    if(last === 'P') scoreP += 1;
    if(last === 'B') scoreB += 1;
}

/* run = 3-5 → มีโอกาสกลับ */
else if(run >= 3 && run <= 5){

if(last === 'P') scoreP += 1.2;
if(last === 'B') scoreB += 1.2;


}

/* run > 5 → Dragon continuation */
else if(run > 5){
    if(last === 'P') scoreP += 1;
    if(last === 'B') scoreB += 1;
}

/* --------------------
TREND MODEL
-------------------- */

const recent = history.slice(-6);

let pCount = recent.filter(x=>x==='P').length;
let bCount = recent.filter(x=>x==='B').length;

if(pCount>bCount) scoreP +=1.5;
if(bCount>pCount) scoreB +=1.5;


/* --------------------
AUTOCORRELATION STYLE
-------------------- */

if(history.length>=2){

const a = history.at(-1);
const b = history.at(-2);

if(a!==b){
if(a==='P') scoreP +=0.5;
if(a==='B') scoreB +=0.5;
}

}

/* --------------------
MICRO CHOP DETECTOR
-------------------- */

if(history.length >= 5){

const last5 = history.slice(-5).join('');

if(last5 === 'PBPBP') scoreB += 2;
if(last5 === 'BPBPB') scoreP += 2;

}

/* --------------------
CHOP DETECTOR PRO

if(state.dna.length >= 6){

let flip = true;

const last6 = state.dna.slice(-6);

for(let i=1;i<last6.length;i++){

if(last6[i] === last6[i-1]){
flip = false;
break;
}

}

if(flip){

scoreP += 1;
scoreB += 1;

}

}

/* 4️⃣ RECOVERY PATTERN */

if(state.dna.length >= 5){

const last5 = state.dna.slice(-5);

if(!last5[0] && !last5[1] && !last5[2] && last5[3] && last5[4]){

scoreP += 1.4;
scoreB += 1.4;

}

}

/* 5️⃣ ACCURACY DROP */

if(state.dna.length >= 6){

const last6 = state.dna.slice(-6);

const win = last6.filter(v=>v).length;

if(win <= 1){

scoreP += 1.2;
scoreB += 1.2;

}

}

/* 6️⃣ ACCURACY SURGE */

if(state.dna.length >= 6){

const last6 = state.dna.slice(-6);

const win = last6.filter(v=>v).length;

if(win >= 5){

scoreP -= 0.5;
scoreB -= 0.5;

}

}

/* --------------------
PREDICTION PATTERN DNA ENGINE
LEVEL 5 AI
-------------------- */

if(state.predictDNA.length >= 10){

let pTotal = 0, pWin = 0;
let bTotal = 0, bWin = 0;

state.predictDNA.forEach(v=>{

if(v.pred === 'P'){
pTotal++;
if(v.win) pWin++;
}

if(v.pred === 'B'){
bTotal++;
if(v.win) bWin++;
}

});

const pRate = pTotal ? pWin / pTotal : 0;
const bRate = bTotal ? bWin / bTotal : 0;

/* bias AI */

if(pTotal >= 3 && pRate > bRate + 0.08){
scoreP += 1.2;
}

if(bTotal >= 3 && bRate > pRate + 0.08){
scoreB += 1.2;
}

}

/* --------------------
ENTROPY DETECTOR
-------------------- */

let entropy = 0;

if(history.length >= 10){

const last10 = history.slice(-10);

let change = 0;

for(let i=1;i<last10.length;i++){
if(last10[i] !== last10[i-1]) change++;
}

entropy = change / 9;   // 0 - 1

}

/* chaos สูง */

if(entropy >= 0.7){

scoreP *= 0.85;
scoreB *= 0.85;

}

/* entropy influence */

if(entropy >= 0.75){

/* chop market */

scoreP *= 1.1;
scoreB *= 1.1;

}

if(entropy <= 0.30){

/* dragon market */

scoreP *= 1.2;
scoreB *= 1.2;

}

/* --------------------
FINAL DECISION
-------------------- */

let result;

if(scoreP > scoreB) result = 'P';
else if(scoreB > scoreP) result = 'B';
else{

const parity = history.length % 2;
result = parity ? 'P' : 'B';

}

/* score difference */

let diff = Math.abs(scoreP - scoreB);

/* base confidence */

let confidence = Math.min(95, 50 + diff * 16);

/* confidence stabilizer */

if(diff < 0.15){
confidence = 45;
}
else if(diff < 0.25){
confidence = 50;
}

/* entropy penalty */

if(entropy >= 0.7){
confidence -= 10;
}

if(entropy >= 0.85){
confidence -= 15;
}

/* --------------------
AI CONFIDENCE CALIBRATION
-------------------- */

const totalDNA = state.dna.length;

if(totalDNA >= 20){

const win = state.dna.filter(v=>v).length;
const rate = win / totalDNA;

/* AI ฟอร์มดี */

if(rate >= 0.6){
confidence += 5;
}

/* AI ฟอร์มตก */

if(rate <= 0.45){
confidence -= 7;
}

}

/* clamp confidence */

confidence = Math.max(40, Math.min(95, confidence));

/* push prediction */

state.predictions.push({
result,
reason:`AI วิเคราะห์ → P:${scoreP.toFixed(2)} | B:${scoreB.toFixed(2)}`,
confidence
});

/* safeguard prediction memory */

if(state.predictions.length > 200){
state.predictions.splice(0, state.predictions.length - 200);
}

} // ปิด generatePrediction

function updateUI(){

renderRoadmap();
renderDNA();
renderPredictDNA();

/* prediction ล่าสุด */
const cur = state.predictions.at(-1) || {result:'WAIT',reason:'',confidence:0};

/* elements */
const resultEl = document.getElementById('prediction-result');
const reasonEl = document.getElementById('prediction-reason');
const riskBox = document.getElementById('risk-alert');

/* --------------------
RISK DETECTOR
-------------------- */

let diff = 0;

if(cur.reason){
const m = cur.reason.match(/P:(\d+\.\d+).*B:(\d+\.\d+)/);
if(m){
diff = Math.abs(parseFloat(m[1]) - parseFloat(m[2]));
}
}

/* --------------------
RISK AI LEVEL
-------------------- */

if(cur.confidence >= 75){

riskBox.classList.add("hidden");

}
else if(cur.confidence >= 60){

riskBox.textContent = "⚠️ ตาเริ่มเสี่ยง AI แนะนำระวัง";
riskBox.classList.remove("hidden");

}
else{

riskBox.textContent = "🚨 ตาเสี่ยงสูง AI แนะนำให้รอ";
riskBox.classList.remove("hidden");

}

/* reason + confidence */

if(cur.result === 'WAIT'){
reasonEl.textContent = "ป้อนข้อมูลเพื่อเริ่มวิเคราะห์";
}else{
reasonEl.textContent = `${cur.reason} | Confidence: ${cur.confidence.toFixed(1)}%`;
}

/* result text */

if (cur.result === 'P') {

resultEl.style.animation = 'none';
resultEl.offsetHeight;
resultEl.style.animation = null;

resultEl.textContent = 'PLAYER';
resultEl.className = 'prediction-result result-p';

}
else if (cur.result === 'B') {

resultEl.style.animation = 'none';
resultEl.offsetHeight;
resultEl.style.animation = null;

resultEl.textContent = 'BANKER';
resultEl.className = 'prediction-result result-b';

}
else {

resultEl.style.animation = 'none';
resultEl.offsetHeight;
resultEl.style.animation = null;

resultEl.textContent = 'WAIT';
resultEl.className = 'prediction-result result-wait';

}

/* --------------------
BETTING STEP UPDATE
-------------------- */

const stepMainEl = document.getElementById('betting-step-main');
const stepStatEl = document.getElementById('betting-step');

if(stepMainEl){
stepMainEl.textContent = state.currentStep;
}

if(stepStatEl){
stepStatEl.textContent = state.currentStep;
}

/* --------------------
STATISTICS
-------------------- */

const total = state.dna.length;
const win = state.dna.filter(v=>v).length;
const loss = total - win;

const winEl = document.getElementById('stat-win');
const lossEl = document.getElementById('stat-loss');
const totalEl = document.getElementById('stat-total');

if(winEl){
winEl.textContent =
`${win} (${total ? Math.round(win/total*100) : 0}%)`;
}

if(lossEl){
lossEl.textContent =
`${loss} (${total ? Math.round(loss/total*100) : 0}%)`;
}

if(totalEl){
totalEl.textContent = total;
}

}

function renderRoadmap(){

const tb = document.getElementById('roadmapTable');
tb.innerHTML = '';

/* แสดงเฉพาะ history ล่าสุด 60 ตา */
const visibleHistory = state.history.slice(-60);
const cols = Math.max(DEFAULT_COLS, Math.ceil(visibleHistory.length / ROWS));

let g = [...Array(ROWS)].map(()=>Array(cols).fill(null));

visibleHistory.forEach((v,i)=>{
g[i % ROWS][Math.floor(i / ROWS)] = v;
});

g.forEach(r=>{
let tr = document.createElement('tr');

r.forEach(c=>{
let td = document.createElement('td');

if(c){
let d = document.createElement('div');
d.className = 'dot ' + c;
d.textContent = c;
td.appendChild(d);
}

tr.appendChild(td);
});

tb.appendChild(tr);

});

}

function renderDNA(){
const tb=document.getElementById('dnaTable');tb.innerHTML='';

state.dna.forEach((v,i)=>g[i%DNA_ROWS][Math.floor(i/DNA_ROWS)]=v);

});
}

function renderPredictDNA(){

const tb = document.getElementById('predictDNA');
const stats = document.getElementById('predictionStats');

tb.innerHTML='';

let pTotal=0,pWin=0;
let bTotal=0,bWin=0;

state.predictDNA.forEach(v=>{
if(v.pred==='P'){
pTotal++;
if(v.win)pWin++;
}
if(v.pred==='B'){
bTotal++;
if(v.win)bWin++;
}
});

const pRate = pTotal?((pWin/pTotal)*100).toFixed(1):0;
const bRate = bTotal?((bWin/bTotal)*100).toFixed(1):0;

stats.innerHTML=
`P accuracy: ${pRate}% (${pWin}/${pTotal}) | B accuracy: ${bRate}% (${bWin}/${bTotal})`;

const rows=4;
const cols=Math.max(16,Math.ceil(state.predictDNA.length/rows));

let grid=[...Array(rows)].map(()=>Array(cols).fill(null));

state.predictDNA.forEach((v,i)=>{
grid[i%rows][Math.floor(i/rows)]=v;
});

grid.forEach(r=>{
let tr=document.createElement('tr');

r.forEach(c=>{
let td=document.createElement('td');

if(c){

td.textContent =
c.pred + '→' + c.real;

td.style.color = c.win
? '#2ecc71'
: '#ff4d6d';

}

tr.appendChild(td);
});

tb.appendChild(tr);
});

}
